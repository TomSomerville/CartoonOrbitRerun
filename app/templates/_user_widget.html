<style>
    .user-widget {
        display: flex;
        flex-direction: row;
        align-items: flex-start;
        height: 100%;
        gap: 10px;
        color: #ffffff;
        font-family: Arial, sans-serif;
        overflow: hidden;
    }

    .uw-avatar {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        border: 2px solid #5bb8e8;
        overflow: hidden;
        flex-shrink: 0;
        background: #1a3a56;
        margin-top: 2px;
    }

    .uw-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .uw-info {
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        gap: 2px;
        min-width: 0;
        flex: 1;
    }

    .uw-username {
        font-size: 0.88rem;
        font-weight: bold;
        color: #c8e8ff;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        line-height: 1.2;
    }

    .uw-stat {
        font-size: 0.7rem;
        color: #a8ccdd;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .uw-stat span {
        color: #ffffff;
        font-weight: bold;
    }

    .uw-divider {
        border: none;
        border-top: 1px solid #1a5f8a;
        margin: 3px 0;
        width: 100%;
    }

    .uw-reset-label {
        font-size: 0.68rem;
        color: #a8ccdd;
    }

    .uw-timer {
        font-size: 0.75rem;
        font-weight: bold;
        color: #ffd700;
        font-variant-numeric: tabular-nums;
    }
</style>

<div class="user-widget">
    <div class="uw-avatar">
        {% if current_user.avatar %}
            <img src="https://cdn.discordapp.com/avatars/{{ current_user.discord_id }}/{{ current_user.avatar }}.png" alt="Avatar">
        {% else %}
            <img src="https://cdn.discordapp.com/embed/avatars/0.png" alt="Avatar">
        {% endif %}
    </div>

    <div class="uw-info">
        <div class="uw-username">{{ current_user.username }}</div>
        <div class="uw-stat"><span>{{ current_user.points }}</span> Points</div>
        <div class="uw-stat"><span>{{ unique_ctoons }}</span> Unique cToons Collected</div>
        <div class="uw-stat"><span>{{ total_ctoons }}</span> Total cToons Collected</div>
        <hr class="uw-divider">
        <div class="uw-reset-label">Daily Points Reset: <span class="uw-timer" id="uw-countdown">--:--:--</span></div>
    </div>
</div>

<script>
(function () {
    const resetAt = {{ reset_timestamp }};
    const el = document.getElementById('uw-countdown');
    if (!el) return;

    function pad(n) { return String(n).padStart(2, '0'); }

    function tick() {
        const diff = resetAt - Date.now();
        if (diff <= 0) {
            el.textContent = '00:00:00';
            return;
        }
        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        el.textContent = pad(h) + ':' + pad(m) + ':' + pad(s);
    }

    tick();
    setInterval(tick, 1000);
})();
</script>
